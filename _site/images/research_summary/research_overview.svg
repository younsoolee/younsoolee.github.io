<svg width="900" height="510" viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="mthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00695c"/>
      <stop offset="100%" stop-color="#004d40"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#00000022"/>
    </filter>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#29b6f6"/>
    </marker>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="900" height="510" fill="#f4f6fa"/>

  <!-- ── HEADER ── -->
  <rect x="0" y="0" width="900" height="72" fill="url(#hdrGrad)"/>
  <rect x="0" y="69" width="900" height="3" fill="#03a9f4"/>
  <text x="450" y="37" text-anchor="middle" fill="white" font-size="19" font-weight="700" letter-spacing="0.5">Research Framework</text>
  <text x="450" y="58" text-anchor="middle" fill="#7986b0" font-size="11">Smart Production Systems Lab · Soongsil University · 숭실대학교 스마트 생산 시스템 연구실</text>

  <!-- ── METHODOLOGY LABEL ── -->
  <text x="30" y="85" fill="#3949ab" font-size="9" font-weight="700" letter-spacing="4">METHODOLOGY  ·  방법론</text>

  <!-- ══ METHOD CARD 1 : Integer Programming ══ -->
  <rect x="30" y="91" width="400" height="168" fill="url(#mthGrad)" rx="10" filter="url(#cardShadow)"/>
  <!-- icon -->
  <circle cx="73" cy="131" r="24" fill="rgba(3,169,244,0.18)" stroke="#29b6f6" stroke-width="1.5"/>
  <text x="73" y="138" text-anchor="middle" fill="#29b6f6" font-size="15" font-weight="800">IP</text>
  <!-- title -->
  <text x="115" y="120" fill="white" font-size="13" font-weight="700">Integer Programming</text>
  <text x="115" y="136" fill="white" font-size="13" font-weight="700">Theory &amp; Algorithms</text>
  <text x="115" y="151" fill="#90b0d8" font-size="10">정수 최적화 이론 및 알고리즘</text>
  <!-- divider -->
  <line x1="44" y1="165" x2="416" y2="165" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- bullets -->
  <circle cx="47" cy="181" r="2.5" fill="#29b6f6"/>
  <text x="57" y="185" fill="rgba(255,255,255,0.88)" font-size="10.5">Polyhedral analysis &amp; valid inequalities</text>
  <circle cx="47" cy="199" r="2.5" fill="#29b6f6"/>
  <text x="57" y="203" fill="rgba(255,255,255,0.88)" font-size="10.5">Extended formulations</text>
  <circle cx="47" cy="217" r="2.5" fill="#29b6f6"/>
  <text x="57" y="221" fill="rgba(255,255,255,0.88)" font-size="10.5">Branch-and-Price / Benders decomposition</text>
  <circle cx="47" cy="235" r="2.5" fill="#29b6f6"/>
  <text x="57" y="239" fill="rgba(255,255,255,0.88)" font-size="10.5">Dantzig-Wolfe column generation</text>

  <!-- ══ METHOD CARD 2 : Uncertainty ══ -->
  <rect x="470" y="91" width="400" height="168" fill="url(#mthGrad)" rx="10" filter="url(#cardShadow)"/>
  <circle cx="513" cy="131" r="24" fill="rgba(3,169,244,0.18)" stroke="#29b6f6" stroke-width="1.5"/>
  <text x="513" y="138" text-anchor="middle" fill="#29b6f6" font-size="15" font-weight="800">UQ</text>
  <text x="555" y="120" fill="white" font-size="13" font-weight="700">Uncertainty &amp; Sequential</text>
  <text x="555" y="136" fill="white" font-size="13" font-weight="700">Decision Making</text>
  <text x="555" y="151" fill="#90b0d8" font-size="10">불확실성 하에서의 순차적 의사결정</text>
  <line x1="484" y1="165" x2="856" y2="165" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="487" cy="181" r="2.5" fill="#29b6f6"/>
  <text x="497" y="185" fill="rgba(255,255,255,0.88)" font-size="10.5">Robust optimization (budget / ellipsoidal sets)</text>
  <circle cx="487" cy="199" r="2.5" fill="#29b6f6"/>
  <text x="497" y="203" fill="rgba(255,255,255,0.88)" font-size="10.5">Approximate dynamic programming (ADP)</text>
  <circle cx="487" cy="217" r="2.5" fill="#29b6f6"/>
  <text x="497" y="221" fill="rgba(255,255,255,0.88)" font-size="10.5">Stochastic programming</text>
  <circle cx="487" cy="235" r="2.5" fill="#29b6f6"/>
  <text x="497" y="239" fill="rgba(255,255,255,0.88)" font-size="10.5">TD learning / value function approximation</text>

  <!-- ══ CONNECTOR BRIDGE ══ -->
  <!-- verticals down from method card bottoms -->
  <line x1="230" y1="259" x2="230" y2="286" stroke="#29b6f6" stroke-width="1.5" opacity="0.55"/>
  <line x1="670" y1="259" x2="670" y2="286" stroke="#29b6f6" stroke-width="1.5" opacity="0.55"/>
  <!-- horizontal bridge -->
  <line x1="163" y1="286" x2="737" y2="286" stroke="#29b6f6" stroke-width="1.5" opacity="0.55"/>
  <!-- bridge label pill -->
  <rect x="350" y="277" width="200" height="18" fill="#0288d1" rx="9" opacity="0.9"/>
  <text x="450" y="289.5" text-anchor="middle" fill="white" font-size="8.5" font-weight="700" letter-spacing="1.8">METHODOLOGY  →  APPLICATION</text>
  <!-- verticals down with arrowheads -->
  <line x1="163" y1="286" x2="163" y2="337" stroke="#29b6f6" stroke-width="1.5" marker-end="url(#arrowHead)" opacity="0.75"/>
  <line x1="450" y1="295" x2="450" y2="337" stroke="#29b6f6" stroke-width="1.5" marker-end="url(#arrowHead)" opacity="0.75"/>
  <line x1="737" y1="286" x2="737" y2="337" stroke="#29b6f6" stroke-width="1.5" marker-end="url(#arrowHead)" opacity="0.75"/>

  <!-- ── APPLICATION LABEL ── -->
  <text x="30" y="356" fill="#00796b" font-size="9" font-weight="700" letter-spacing="4">APPLICATION  ·  응용 분야</text>

  <!-- ══ APP CARD 1 : Smart Production ══ -->
  <rect x="30" y="363" width="265" height="132" fill="url(#appGrad)" rx="10" filter="url(#cardShadow)"/>
  <circle cx="68" cy="394" r="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="68" y="401" text-anchor="middle" fill="#80cbc4" font-size="15">⚙</text>
  <text x="103" y="390" fill="white" font-size="12" font-weight="700">Smart Production</text>
  <text x="103" y="405" fill="#80cbc4" font-size="9.5">스마트 생산 시스템</text>
  <line x1="44" y1="414" x2="282" y2="414" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="47" cy="427" r="2.3" fill="#80cbc4"/>
  <text x="56" y="431" fill="rgba(255,255,255,0.86)" font-size="9.5">Lot-sizing &amp; scheduling</text>
  <circle cx="47" cy="444" r="2.3" fill="#80cbc4"/>
  <text x="56" y="448" fill="rgba(255,255,255,0.86)" font-size="9.5">Semiconductor / FPD / Steel</text>
  <circle cx="47" cy="461" r="2.3" fill="#80cbc4"/>
  <text x="56" y="465" fill="rgba(255,255,255,0.86)" font-size="9.5">Reconfigurable Mfg. Systems (RMS)</text>
  <circle cx="47" cy="478" r="2.3" fill="#80cbc4"/>
  <text x="56" y="482" fill="rgba(255,255,255,0.86)" font-size="9.5">Battery system optimization</text>

  <!-- ══ APP CARD 2 : Energy Systems ══ -->
  <rect x="318" y="363" width="264" height="132" fill="url(#appGrad)" rx="10" filter="url(#cardShadow)"/>
  <circle cx="355" cy="394" r="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="355" y="401" text-anchor="middle" fill="#80cbc4" font-size="15">⚡</text>
  <text x="390" y="390" fill="white" font-size="12" font-weight="700">Energy Systems</text>
  <text x="390" y="405" fill="#80cbc4" font-size="9.5">에너지 시스템</text>
  <line x1="332" y1="414" x2="570" y2="414" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="335" cy="427" r="2.3" fill="#80cbc4"/>
  <text x="344" y="431" fill="rgba(255,255,255,0.86)" font-size="9.5">EV charging &amp; V2G scheduling</text>
  <circle cx="335" cy="444" r="2.3" fill="#80cbc4"/>
  <text x="344" y="448" fill="rgba(255,255,255,0.86)" font-size="9.5">Robust BESS optimization</text>
  <circle cx="335" cy="461" r="2.3" fill="#80cbc4"/>
  <text x="344" y="465" fill="rgba(255,255,255,0.86)" font-size="9.5">PWL efficiency / SOS2 modeling</text>
  <circle cx="335" cy="478" r="2.3" fill="#80cbc4"/>
  <text x="344" y="482" fill="rgba(255,255,255,0.86)" font-size="9.5">Multi-pack battery inhomogeneity</text>

  <!-- ══ APP CARD 3 : Supply Chain ══ -->
  <rect x="605" y="363" width="265" height="132" fill="url(#appGrad)" rx="10" filter="url(#cardShadow)"/>
  <circle cx="642" cy="394" r="20" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="642" y="402" text-anchor="middle" fill="#80cbc4" font-size="14" font-weight="600">SCM</text>
  <text x="677" y="390" fill="white" font-size="12" font-weight="700">Supply Chain Mgmt.</text>
  <text x="677" y="405" fill="#80cbc4" font-size="9.5">공급망 관리</text>
  <line x1="619" y1="414" x2="857" y2="414" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="622" cy="427" r="2.3" fill="#80cbc4"/>
  <text x="631" y="431" fill="rgba(255,255,255,0.86)" font-size="9.5">Closed-loop supply chain</text>
  <circle cx="622" cy="444" r="2.3" fill="#80cbc4"/>
  <text x="631" y="448" fill="rgba(255,255,255,0.86)" font-size="9.5">Liner shipping fleet assignment</text>
  <circle cx="622" cy="461" r="2.3" fill="#80cbc4"/>
  <text x="631" y="465" fill="rgba(255,255,255,0.86)" font-size="9.5">Dark store / last-mile logistics</text>
  <circle cx="622" cy="478" r="2.3" fill="#80cbc4"/>
  <text x="631" y="482" fill="rgba(255,255,255,0.86)" font-size="9.5">Network flow &amp; decomposition</text>
</svg>
